<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex, nofollow" />
<title>听宅人 · 数据复盘看板</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
  :root{
    /* 明亮清爽配色 */
    --candy-blue:#5B9BFF; --candy-blue-bg:#EAF3FF;
    --candy-green:#22C9A0; --candy-green-bg:#E2FBF3;
    --candy-yellow:#FFC83C; --candy-yellow-bg:#FFF6DA;
    --candy-pink:#FF8FB3; --candy-pink-bg:#FFEAF1;
    --candy-purple:#A98BF0; --candy-purple-bg:#F0E9FF;
    /* 平台主色 (明亮红 / 明亮蓝) */
    --xhs:#FF4D6D; --xhs-soft:#FFE7EC;
    --dy:#4C8DFF;  --dy-soft:#E6F0FF;
    /* 涨跌 (涨=红, 跌=绿) */
    --up:#FF5A5A; --down:#1FC08A;
    --ink:#1d2128; --ink-2:#5b626b; --ink-3:#949aa3;
    --line:#edeff2; --bg:#f6f8fb; --card:#ffffff;
    --radius:16px; --shadow:0 2px 14px rgba(31,35,41,.05);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
       background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;font-size:15px}
  .app{display:flex;min-height:100vh}

  /* ---------------- 左栏 ---------------- */
  .sidebar{width:210px;flex-shrink:0;background:var(--card);border-right:1px solid var(--line);
           padding:22px 16px;position:sticky;top:0;height:100vh;overflow-y:auto}
  .sidebar .brand{font-size:16px;font-weight:700;margin-bottom:4px}
  .sidebar .brand small{display:block;font-size:11px;color:var(--ink-3);font-weight:400;margin-top:2px}
  .acct-group{margin-top:22px}
  .acct-group .grp-title{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--ink-3);
           font-weight:600;margin-bottom:8px;padding-left:4px}
  .dot{width:8px;height:8px;border-radius:50%}
  .dot.xhs{background:var(--xhs)} .dot.dy{background:var(--dy)}
  .acct{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;border-radius:10px;
        font-size:14px;cursor:pointer;color:var(--ink);transition:background .15s;margin-bottom:2px}
  .acct:hover{background:var(--bg)}
  .acct.active{background:var(--xhs-soft);color:var(--xhs);font-weight:600}
  .acct.dy.active{background:var(--dy-soft);color:var(--dy)}
  .acct.disabled{color:var(--ink-3);cursor:not-allowed}
  .acct.disabled:hover{background:transparent}
  .acct .tag{font-size:10px;color:var(--ink-3);background:var(--bg);padding:1px 6px;border-radius:6px}

  /* ---------------- 右侧主区 ---------------- */
  .main{flex:1;padding:24px 28px 60px;min-width:0}
  .page-head{display:flex;align-items:baseline;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:20px}
  .page-head h1{font-size:25px;font-weight:700}
  .page-head .upd{font-size:13px;color:var(--ink-3)}

  .section-label{font-size:15px;font-weight:600;color:var(--ink-2);margin:6px 0 12px;display:flex;align-items:center;gap:8px}
  .est-tag{font-size:10px;color:#b06a00;background:#FFF3DB;padding:1px 7px;border-radius:6px;font-weight:500}
  .stale-tag{font-size:10px;color:#8f959e;background:#f0f1f3;padding:1px 7px;border-radius:6px;font-weight:500;margin-left:6px}

  /* 诊断雷达 并排 */
  .diagnosis{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:26px}
  .diag-card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px 20px}
  .diag-card.xhs{border-top:3px solid var(--xhs)}
  .diag-card.dy{border-top:3px solid var(--dy)}
  .diag-card .dc-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
  .diag-card .dc-head .ttl{font-size:15px;font-weight:700;display:flex;align-items:center;gap:7px}
  .diag-card .dc-head .period{font-size:11px;color:var(--ink-3)}
  .diag-card .note{font-size:11px;color:var(--ink-3);margin-bottom:8px}
  .radar-wrap{position:relative;height:260px}

  /* tab */
  .tabs{display:flex;gap:6px;border-bottom:1px solid var(--line);margin-bottom:20px;flex-wrap:wrap}
  .tab{padding:10px 18px;font-size:14px;color:var(--ink-2);cursor:pointer;border-bottom:2px solid transparent;
       font-weight:500;transition:color .15s}
  .tab:hover{color:var(--ink)}
  .tab.active{color:var(--xhs);border-bottom-color:var(--xhs);font-weight:600}

  /* 周期切换 */
  .period-toggle{display:inline-flex;background:var(--bg);border-radius:10px;padding:3px;margin-bottom:18px}
  .period-toggle button{border:0;background:transparent;padding:6px 18px;border-radius:8px;font-size:13px;
       color:var(--ink-2);cursor:pointer;font-weight:500}
  .period-toggle button.active{background:var(--card);color:var(--ink);box-shadow:0 1px 4px rgba(0,0,0,.08);font-weight:600}

  /* 平台点选切换 */
  .platform-toggle{display:inline-flex;gap:4px;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:4px;margin-bottom:22px;box-shadow:var(--shadow)}
  .platform-toggle .pt-btn{display:flex;align-items:center;gap:7px;border:0;background:transparent;padding:9px 24px;border-radius:9px;font-size:15px;font-weight:600;color:var(--ink-2);cursor:pointer;transition:background .15s,color .15s}
  .platform-toggle .pt-btn .dot{width:9px;height:9px;border-radius:50%}
  .platform-toggle .pt-btn:hover{background:var(--bg)}
  .platform-toggle .pt-btn.xhs.active{background:var(--xhs-soft);color:var(--xhs)}
  .platform-toggle .pt-btn.dy.active{background:var(--dy-soft);color:var(--dy)}

  /* 平台子板块 */
  .platform-block{margin-bottom:14px}
  .pf-title{display:flex;align-items:center;gap:8px;font-size:16px;font-weight:700;margin-bottom:12px}
  .pf-title .chip{font-size:10px;color:#fff;padding:2px 8px;border-radius:6px}
  .pf-title.xhs .chip{background:var(--xhs)} .pf-title.dy .chip{background:var(--dy)}

  .card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px 20px;margin-bottom:18px}

  /* 指标卡 grid */
  .kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
  .kpi{border-radius:12px;padding:14px 16px}
  .kpi:nth-child(6n+1){background:var(--candy-blue-bg)}
  .kpi:nth-child(6n+2){background:var(--candy-green-bg)}
  .kpi:nth-child(6n+3){background:var(--candy-yellow-bg)}
  .kpi:nth-child(6n+4){background:var(--candy-pink-bg)}
  .kpi:nth-child(6n+5){background:var(--candy-purple-bg)}
  .kpi:nth-child(6n+6){background:var(--candy-blue-bg)}
  .kpi .k-label{font-size:13.5px;color:var(--ink-2);margin-bottom:8px}
  .kpi .k-value{font-size:30px;font-weight:700;line-height:1.1}
  .kpi .k-value .u{font-size:14px;font-weight:500;color:var(--ink-2);margin-left:2px}
  .kpi .k-delta{font-size:13px;margin-top:6px;font-weight:600}
  .k-delta.up{color:var(--up)} .k-delta.down{color:var(--down)} .k-delta.flat{color:var(--ink-3)}

  .trend-wrap{position:relative;height:220px;margin-top:16px}

  /* 横向条形(观看来源) */
  .bars{display:flex;flex-direction:column;gap:14px;margin-top:4px}
  .bar-row{display:grid;grid-template-columns:84px 1fr 96px;align-items:center;gap:12px}
  .bar-row .b-label{font-size:13px;color:var(--ink)}
  .bar-track{height:14px;background:var(--bg);border-radius:8px;overflow:hidden}
  .bar-fill{height:100%;border-radius:8px}
  .bar-row .b-val{font-size:13px;text-align:right;color:var(--ink)}
  .bar-row .b-val b{font-size:14px}
  .b-delta{font-size:11px;margin-left:6px;font-weight:600}
  .extra-note{font-size:12px;color:var(--ink-3);margin-top:14px;padding-top:12px;border-top:1px dashed var(--line)}

  .slot-wrap{position:relative;height:220px;margin-top:4px}

  /* 排行榜 */
  .rank-list{display:flex;flex-direction:column;gap:10px}
  .rank-item{display:flex;align-items:center;gap:14px;padding:12px;border-radius:12px;background:var(--bg)}
  .rank-no{width:26px;height:26px;flex-shrink:0;border-radius:8px;color:#fff;font-weight:700;font-size:14px;
           display:flex;align-items:center;justify-content:center}
  .rank-no.n1{background:#FF7A45} .rank-no.n2{background:#FFA940} .rank-no.n3{background:#FFC069}
  .rank-main{flex:1;min-width:0}
  .rank-main .r-title{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .rank-main .r-date{font-size:11px;color:var(--ink-3);margin-top:3px}
  .rank-stats{display:flex;gap:18px;flex-shrink:0}
  .rank-stats .rs{text-align:center}
  .rank-stats .rs .v{font-size:14px;font-weight:700;color:var(--xhs)}
  .rank-stats .rs .l{font-size:11px;color:var(--ink-3);margin-top:2px}

  /* 空状态 */
  .empty{padding:40px 20px;text-align:center;color:var(--ink-3);font-size:14px}
  .empty.big{padding:120px 20px;font-size:16px}
  .empty .ei{font-size:30px;margin-bottom:10px}

  .placeholder{padding:90px 20px;text-align:center;color:var(--ink-3)}
  .placeholder .pi{font-size:34px;margin-bottom:12px}
  .placeholder .pt{font-size:16px;font-weight:600;color:var(--ink-2)}
  .placeholder .ps{font-size:13px;margin-top:6px}

  /* 作品分析 */
  .work-item{border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin-bottom:12px}
  .work-item:last-child{margin-bottom:0}
  .work-head{display:flex;justify-content:space-between;align-items:baseline;gap:10px}
  .w-title{font-size:14px;font-weight:600}
  .w-date{font-size:11px;color:var(--ink-3);flex-shrink:0}
  .w-tags{font-size:12px;color:var(--dy);margin:6px 0 12px}
  .w-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
  .w-stats .ws{text-align:center;background:var(--bg);border-radius:8px;padding:8px 4px}
  .w-stats .ws .v{font-size:15px;font-weight:700}
  .w-stats .ws .l{font-size:11px;color:var(--ink-3);margin-top:3px}
  .w-reward{margin-top:12px;font-size:12px;color:#b06a00;background:#FFF3DB;padding:6px 10px;border-radius:8px;display:inline-block}

  /* 观众数据 */
  .sub-title{font-size:13px;font-weight:600;margin:18px 0 10px;color:var(--ink);display:flex;align-items:center;gap:8px}
  .card > .sub-title:first-child{margin-top:0}
  .base-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
  .base-card{background:var(--dy-soft);border-radius:12px;padding:14px 16px}
  .base-card .bc-label{font-size:13px;color:var(--ink-2)}
  .base-card .bc-value{font-size:26px;font-weight:700;margin:6px 0 4px}
  .base-card .bc-sub{font-size:12px;color:var(--ink-3)}
  .growth-wrap{position:relative;height:200px;margin-top:4px}
  .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:18px}
  .conclusion{background:var(--dy-soft);border-radius:10px;padding:12px 14px;font-size:13px;font-weight:600;color:var(--dy);margin-bottom:16px}
  .gender-bar{display:flex;height:32px;border-radius:8px;overflow:hidden;font-size:12px;color:#fff;font-weight:600}
  .gender-bar .male{background:var(--dy);display:flex;align-items:center;justify-content:center;min-width:36px}
  .gender-bar .female{background:var(--xhs);display:flex;align-items:center;justify-content:center;min-width:36px}
  .fan-list{display:flex;flex-direction:column;gap:8px}
  .fan-item{display:flex;align-items:center;gap:12px;padding:10px 12px;background:var(--bg);border-radius:10px}
  .fan-rank{width:22px;height:22px;flex-shrink:0;border-radius:6px;background:var(--dy);color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center}
  .fan-name{flex:1;font-size:14px}
  .fan-idx{font-size:12px;color:var(--ink-2)}
  .word-chips{display:flex;flex-wrap:wrap;gap:8px}
  .word-chip{font-size:12px;background:var(--bg);border:1px solid var(--line);border-radius:8px;padding:6px 12px}
  .word-chip b{color:var(--dy);margin-left:6px}

  /* 北极星指标 */
  .northstar{background:linear-gradient(135deg,#ffffff,#fff7ef);border:1px solid #ffe3c2;border-radius:var(--radius);
    box-shadow:var(--shadow);padding:18px 20px;margin-bottom:24px}
  .northstar .ns-head{display:flex;align-items:baseline;gap:10px;margin-bottom:14px;flex-wrap:wrap}
  .northstar .ns-star{font-size:18px}
  .northstar .ns-ttl{font-size:16px;font-weight:700}
  .northstar .ns-sub{font-size:11px;color:var(--ink-3)}
  .ns-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px}
  .ns-card{border-radius:12px;padding:14px 16px;background:var(--bg);border-left:4px solid var(--ink-3)}
  .ns-card.bad{border-left-color:var(--up);background:#fff1f0}
  .ns-card.good{border-left-color:var(--down);background:#e9f9f1}
  .ns-card.neutral{border-left-color:var(--candy-blue);background:var(--candy-blue-bg)}
  .ns-card .nc-label{font-size:12px;color:var(--ink-2);margin-bottom:6px}
  .ns-card .nc-value{font-size:28px;font-weight:800;line-height:1}
  .ns-card .nc-value .u{font-size:14px;font-weight:600;margin-left:2px}
  .ns-card .nc-cmp{font-size:12px;margin-top:8px;font-weight:700}
  .ns-card.bad .nc-cmp{color:var(--up)} .ns-card.good .nc-cmp{color:var(--down)}
  .ns-card .nc-peer{font-size:11px;color:var(--ink-3);font-weight:400;margin-top:4px}

  /* 流量分析表格 */
  .flow-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
  .flow-grid .fc{background:var(--candy-blue-bg);border-radius:10px;padding:12px 14px;text-align:center}
  .flow-grid .fc .fcl{font-size:11px;color:var(--ink-2);margin-bottom:4px}
  .flow-grid .fc .fcv{font-size:22px;font-weight:700;color:var(--ink)}
  .flow-grid .fc .fcv .u{font-size:12px;font-weight:500;color:var(--ink-2)}

  .flow-table{width:100%;border-collapse:collapse;font-size:13px}
  .flow-table th{text-align:left;padding:8px 6px;font-weight:600;color:var(--ink-2);border-bottom:2px solid var(--line);white-space:nowrap;font-size:11px}
  .flow-table td{padding:8px 6px;border-bottom:1px solid var(--line);vertical-align:middle}
  .flow-table tr:hover td{background:var(--bg)}
  .flow-table .ft-title{max-width:180px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:600}
  .flow-table .ft-val{font-weight:700;text-align:center}
  .flow-table .ft-val.click{color:var(--dy)}
  .flow-table .ft-val.finish{color:var(--down)}
  .flow-table .ft-val.bounce{color:var(--up)}
  .flow-table .ft-reward{color:#b06a00;background:#FFF3DB;padding:1px 6px;border-radius:4px;font-weight:600;font-size:11px}

  /* 复盘洞察: 关联探索 + 动作建议 */
  .scatter-wrap{position:relative;height:300px;margin-top:6px}
  .insight-note{font-size:12px;color:var(--ink-3);margin-top:12px;padding-top:10px;border-top:1px dashed var(--line);line-height:1.7}
  .act-list{display:flex;flex-direction:column;gap:12px}
  .act-item{display:flex;gap:14px;align-items:flex-start;padding:14px;border-radius:12px;background:var(--bg)}
  .act-badge{flex-shrink:0;font-size:13px;font-weight:700;color:#fff;padding:6px 12px;border-radius:8px;min-width:52px;text-align:center}
  .act-badge.keep{background:var(--down)} .act-badge.tune{background:#E89C00}
  .act-badge.cut{background:var(--up)} .act-badge.watch{background:var(--ink-3)}
  .act-main{flex:1;min-width:0}
  .act-title{font-size:14px;font-weight:600}
  .act-reason{font-size:12px;color:var(--ink-2);margin-top:5px;line-height:1.55}
  .act-stats{font-size:11px;color:var(--ink-3);margin-top:7px;display:flex;gap:14px;flex-wrap:wrap}
  .act-stats b{color:var(--ink);font-weight:600}

  @media(max-width:900px){
    .app{flex-direction:column}
    .sidebar{width:100%;height:auto;position:static;border-right:0;border-bottom:1px solid var(--line)}
    .acct-group{margin-top:14px}
    .diagnosis{grid-template-columns:1fr}
    .kpi-grid{grid-template-columns:repeat(2,1fr)}
    .rank-stats{gap:10px}
    .base-grid{grid-template-columns:repeat(2,1fr)}
    .w-stats{grid-template-columns:repeat(2,1fr)}
    .grid-2{grid-template-columns:1fr}
  }
</style>
</head>
<body>
<div class="app">
  <!-- 左栏 -->
  <aside class="sidebar">
    <div class="brand">数据复盘看板<small>小红书 &amp; 抖音 · 团队复盘</small></div>
    <div id="acctGroups"></div>
  </aside>

  <!-- 右侧 -->
  <main class="main">
    <div class="page-head">
      <h1 id="pageTitle">听宅人 · 数据复盘</h1>
      <div class="upd" id="pageUpd"></div>
    </div>
    <div id="content"></div>
  </main>
</div>

<script src="data.js"></script>
<script>
/* ===================== 状态 ===================== */
const D = DASHBOARD_DATA;
const STALE = '<span class="stale-tag">未更新最新数据</span>';
let curAccount = D.defaultAccount;
let curTab = "overview";          // overview | works | audience | revenue
let curPeriod = "d30";            // d7 | d30
let curPlatform = "xhs";          // xhs | dy  (点选式平台切换)
let charts = [];                  // Chart 实例, 切换时销毁

function destroyCharts(){ charts.forEach(c=>c.destroy()); charts=[]; }
function el(html){ const t=document.createElement("template"); t.innerHTML=html.trim(); return t.content.firstChild; }
function deltaHtml(d){
  if(d===null||d===undefined) return "";
  if(d===0) return `<div class="k-delta flat">环比 +0%</div>`;
  const cls = d>0 ? "up":"down";
  const sign = d>0 ? "+":"";
  return `<div class="k-delta ${cls}">环比 ${sign}${d}%</div>`;
}

/* ===================== 左栏 ===================== */
function renderSidebar(){
  const box = document.getElementById("acctGroups");
  box.innerHTML = "";
  D.platformOrder.forEach(pf=>{
    const group = el(`<div class="acct-group">
      <div class="grp-title"><span class="dot ${pf}"></span>${D.platformLabels[pf]}</div>
    </div>`);
    D.accounts.forEach(acc=>{
      const has = acc[pf];
      const isActive = has && acc.id===curAccount;
      const node = el(`<div class="acct ${pf} ${isActive?'active':''} ${has?'':'disabled'}">
        <span>${acc.name}</span>${has?'':'<span class="tag">暂无数据</span>'}</div>`);
      if(has) node.addEventListener("click",()=>{ curAccount=acc.id; renderSidebar(); renderContent(); });
      group.appendChild(node);
    });
    box.appendChild(group);
  });
}

/* ===================== 主区 ===================== */
function renderContent(){
  destroyCharts();
  const acc = D.data[curAccount];
  document.getElementById("pageTitle").textContent =
    (D.accounts.find(a=>a.id===curAccount)?.name || "") + " · 数据复盘";
  document.getElementById("pageUpd").textContent =
    `数据统计截至 ${D.updatedAt}（平台延迟约1天）　·　看板最后更新 ${D.lastUpdate || "—"}`;
  const c = document.getElementById("content");
  c.innerHTML = "";

  if(!acc){
    c.appendChild(el(`<div class="empty big"><div class="ei">📭</div>该账号暂无数据，截图发我即可补充。</div>`));
    return;
  }

  // 平台点选切换 (小红书 / 抖音, 一次只看一个)
  c.appendChild(renderPlatformToggle());

  // 北极星指标 (影视飓风: 平均观看百分比为算法决定性指标)
  const nsNode = renderNorthStar();
  if(nsNode) c.appendChild(nsNode);

  // 诊断雷达
  c.appendChild(renderDiagnosis(acc.diagnosis));

  // 弹窗容器 (供小红书和抖音共用)
  c.appendChild(el(`<div id="detailModal" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:10000;overflow-y:auto;padding:20px" onclick="if(event.target===this)closeDetail()">
    <div style="background:#fff;max-width:1100px;margin:0 auto;border-radius:16px;padding:24px 28px;position:relative">
      <button onclick="closeDetail()" style="position:absolute;top:14px;right:16px;border:0;background:var(--bg);font-size:20px;width:36px;height:36px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center">✕</button>
      <div id="detailContent"></div>
    </div>
  </div>`));

  // tab 栏
  const tabs = [
    {id:"overview",name:"账号概览"},
    {id:"works",name:"作品概览"},
    {id:"insight",name:"复盘洞察"},
    {id:"audience",name:"观众数据"},
    {id:"revenue",name:"收入数据"},
  ];
  const tabBar = el(`<div class="tabs"></div>`);
  tabs.forEach(t=>{
    const node = el(`<div class="tab ${t.id===curTab?'active':''}">${t.name}</div>`);
    node.addEventListener("click",()=>{ curTab=t.id; renderContent(); });
    tabBar.appendChild(node);
  });
  c.appendChild(tabBar);

  // tab 内容
  if(curTab==="overview") c.appendChild(renderOverview(acc));
  else if(curTab==="works") c.appendChild(renderWorksOverview(acc));
  else if(curTab==="insight") c.appendChild(renderInsight(acc));
  else if(curTab==="audience") c.appendChild(renderAudience(acc));
  else if(curTab==="revenue") c.appendChild(renderRevenue(acc));
  else c.appendChild(renderPlaceholder());

  // 雷达需在节点入 DOM 后再画
  requestAnimationFrame(()=>drawDiagnosisCharts(acc.diagnosis));
}

function renderDiagnosis(diag){
  const wrap = el(`<div class="diagnosis" style="grid-template-columns:1fr"></div>`);
  if(curPlatform==="xhs"){
    wrap.appendChild(el(`<div class="diag-card xhs">
      <div class="dc-head"><div class="ttl"><span class="dot xhs"></span>小红书 · 账号诊断</div>
        <div class="period">${diag.xhs.period}</div></div>
      <div class="note">红线=你的数据，半径为「超过同类百分位」，标签为真实值${diag.xhs.percentileStale?'<span class="stale-tag">百分位未更新最新数据</span>':''}</div>
      <div class="radar-wrap"><canvas id="radarXhs"></canvas></div>
    </div>`));
  } else {
    wrap.appendChild(el(`<div class="diag-card dy">
      <div class="dc-head"><div class="ttl"><span class="dot dy"></span>抖音 · 账号诊断</div>
        <div class="period">${diag.dy.period}</div></div>
      <div class="note">蓝=你的帐号，橙=同类作者，标签为真实值${diag.dy.note?'（'+diag.dy.note+'）':''}</div>
      <div class="radar-wrap"><canvas id="radarDy"></canvas></div>
    </div>`));
  }
  return wrap;
}
function drawDiagnosisCharts(diag){
  if(curPlatform==="xhs"){
    // 小红书: 单线, 半径=百分位
    const xa = diag.xhs.axes;
    charts.push(new Chart(document.getElementById("radarXhs"),{
      type:"radar",
      data:{ labels:xa.map(a=>`${a.label} ${a.value}`),
        datasets:[{ label:"你的数据", data:xa.map(a=>a.percentile),
          borderColor:"#FF4D6D", backgroundColor:"rgba(255,77,109,.15)",
          borderWidth:2, pointBackgroundColor:"#FF4D6D", pointRadius:3 }]},
      options:radarOpts(100, v=>`超过 ${v}% 同类`)
    }));
    return;
  }
  // 抖音: 双线, 各维度归一化到该维度最大值
  const da = diag.dy.axes;
  const norm = (v,a)=> a.peer===0&&a.mine===0 ? 0 : (v/Math.max(a.mine,a.peer)*100);
  charts.push(new Chart(document.getElementById("radarDy"),{
    type:"radar",
    data:{ labels:da.map(a=>a.label),
      datasets:[
        { label:"你的帐号", data:da.map(a=>norm(a.mine,a)),
          borderColor:"#4C8DFF", backgroundColor:"rgba(76,141,255,.15)",
          borderWidth:2, pointBackgroundColor:"#4C8DFF", pointRadius:3 },
        { label:"同类作者", data:da.map(a=>norm(a.peer,a)),
          borderColor:"#FFAE4D", backgroundColor:"rgba(255,174,77,.12)",
          borderWidth:2, pointBackgroundColor:"#FFAE4D", pointRadius:3 },
      ]},
    options:radarOpts(100, null, da)
  }));
}
function radarOpts(max, fmtSingle, dyAxes){
  return {
    responsive:true, maintainAspectRatio:false,
    plugins:{
      legend:{ display:!!dyAxes, position:"bottom", labels:{boxWidth:10,font:{size:11}} },
      tooltip:{ callbacks:{ label:(ctx)=>{
        if(dyAxes){ const a=dyAxes[ctx.dataIndex];
          return ctx.datasetIndex===0 ? `你的帐号: ${a.mineText}` : `同类作者: ${a.peerText}`; }
        return fmtSingle ? fmtSingle(ctx.raw) : ctx.formattedValue;
      }}}
    },
    scales:{ r:{ min:0, max, ticks:{display:false,stepSize:25},
      grid:{color:"#eef0f3"}, angleLines:{color:"#eef0f3"},
      pointLabels:{font:{size:11},color:"#646a73"} } }
  };
}

function sectionLabel(txt){ return el(`<div class="section-label">${txt}</div>`); }
function pfTitle(pf, extraHtml=""){

  return `<div class="pf-title ${pf}"><span class="chip">${name}</span>${extraHtml}</div>`;

function emptyCard(pf){

function overviewBlock(pf, d){
  if(!d) return emptyCard(pf);
  const block = el(`<div class="platform-block">${pfTitle(pf)}</div>`);
  const card = el(`<div class="card"></div>`);
  const grid = el(`<div class="kpi-grid"></div>`);
  d.cards.forEach(k=>{
    grid.appendChild(el(`<div class="kpi">
      <div class="k-label">${k.label}</div>
      <div class="k-value">${k.value}<span class="u">${k.unit}</span></div>
      ${deltaHtml(k.delta)}
    </div>`));
  });
  card.appendChild(grid);
  if(d.trend){
    const id = "trend_"+pf;
    const trendTag = d.trend.real
      ? `<span class="est-tag" style="color:#0a7d54;background:#e3f8ef">✓ 真实后台数据</span>`
      : `<span class="est-tag">形态依据截图估算</span>`;
    card.appendChild(el(`<div class="section-label" style="margin-top:18px">趋势 · ${d.trend.unitText}
      ${trendTag}</div>`));
    card.appendChild(el(`<div class="trend-wrap"><canvas id="${id}"></canvas></div>`));
    requestAnimationFrame(()=>drawTrend(id, d.trend, pf));
  } else if(d.trendStale){
    card.appendChild(el(`<div class="section-label" style="margin-top:18px">浏览趋势 ${STALE}</div>`));
  }
  block.appendChild(card);
  return block;
}
function drawTrend(id, t, pf){
  const color = pf==="xhs" ? "#FF4D6D" : "#4C8DFF";
  charts.push(new Chart(document.getElementById(id),{
    type:"line",
    data:{ labels:t.labels, datasets:[{ data:t.values, borderColor:color,
      backgroundColor:(pf==="xhs"?"rgba(255,77,109,.08)":"rgba(76,141,255,.08)"),
      borderWidth:2, fill:true, tension:.4, pointRadius:0, pointHoverRadius:4 }]},
    options:{ responsive:true, maintainAspectRatio:false,
      plugins:{legend:{display:false}},
      scales:{ x:{grid:{display:false},ticks:{font:{size:10},color:"#8f959e",maxRotation:0,autoSkip:true,maxTicksLimit:8}},
               y:{grid:{color:"#f2f3f5"},ticks:{font:{size:10},color:"#8f959e"},beginAtZero:true} } }
  }));
}

function sourceBlock(pf, d){
  if(!d) return emptyCard(pf);
  const staleHtml = d.stale ? STALE : "";
  const periodTxt = d.period ? `<span style="font-size:11px;color:var(--ink-3);margin-left:auto">${d.period}</span>` : "";
  const block = el(`<div class="platform-block">${pfTitle(pf, staleHtml+periodTxt)}</div>`);
  const card = el(`<div class="card"></div>`);
  const bars = el(`<div class="bars"></div>`);
  const max = Math.max(...d.items.map(i=>i.pct));
  const colors = ["#5B9BFF","#22C9A0","#FFC83C","#FF8FB3"];
  d.items.forEach((it,i)=>{
    const w = (it.pct/max*100).toFixed(1);
    let dh = "";
    if(it.delta!==undefined&&it.delta!==null){
      const cls = it.delta>0?"up":"down"; const sign=it.delta>0?"+":"";
      dh = `<span class="b-delta ${cls}" style="color:${it.delta>0?'var(--up)':'var(--down)'}">${sign}${it.delta}%</span>`;
    }
    bars.appendChild(el(`<div class="bar-row">
      <div class="b-label">${it.label}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${w}%;background:${colors[i%4]}"></div></div>
      <div class="b-val"><b>${it.pct}%</b>${dh}</div>
    </div>`));
  });
  card.appendChild(bars);
  block.appendChild(card);
  return block;
}

function rankBlock(pf, d){

    <b>2秒跳出率：</b>观众在前2秒就划走，越低越好。
  </div></div>`);
  wrap.appendChild(card3);

  return wrap;
}

      const hue = Math.round(220 - item.pct * 2.2);

    });

  }
  // 城市 TOP
  const c = p.city || {};
  if(c.items && c.items.length){
    h += `<div style="margin-bottom:10px"><div class="k-label" style="margin-bottom:6px">城市 TOP</div>
      <div style="display:flex;flex-wrap:wrap;gap:6px">`;
    c.items.slice(0,5).forEach(item=>{
      h += `<span style="padding:4px 12px;border-radius:8px;font-size:12px;background:var(--candy-blue-bg);color:var(--xhs);font-weight:600">${item.label} ${item.pct}%</span>`;
    });

  }
  // 兴趣 TOP
  const i = p.interest || {};
  if(i.items && i.items.length){
    h += `<div style="margin-bottom:4px"><div class="k-label" style="margin-bottom:6px">兴趣偏好</div>

  }
  h += `</div>`;
  return h;
}

/* ===================== 复盘方法层 (影视飓风四原则) ===================== */
/* 把 "74.2万" / "1.2万" / "32.06%" / "35秒" 等字符串解析成纯数字 */
function parseNum(v){
  if(typeof v==="number") return v;
  if(v==null) return NaN;
  let s = String(v).replace(/[,，%＋+\s]/g,"");
  let mult = 1;
  if(s.includes("亿")){ mult=1e8; s=s.replace("亿",""); }
  else if(s.includes("万")){ mult=1e4; s=s.replace("万",""); }
  const n = parseFloat(s);
  return isNaN(n) ? NaN : n*mult;
}

      cls = gap<0 ? "bad" : "good";
      cmp = gap<0 ? `↓ 低于同类 ${Math.abs(gap)} pt · 最该补`

      peer = `${it.peerLabel}：${it.peer}${it.unit}`;

/* 根据阈值给单条作品判定动作 (数据接动作) */
function computeVerdict(plays, finish){
  const b = D.playbook.benchmarks;
  if(plays>=b.hitPlays)
    return {v:"保留", c:"keep", r:`爆款，播放破 ${b.hitPlays/10000} 万——复制这个选题方向，加大同类产出`};
  if(finish>=b.goodFinish)
    return {v:"优化", c:"tune", r:"5秒完播不错、但播放没跑量——内容留得住人，瓶颈在曝光/封面/标题，值得加推或复制选题"};
  if(finish<b.lowFinish)
    return {v:"砍", c:"cut", r:"5秒完播偏低——开头没留住人，优化前 3 秒钩子，或换选题方向"};
  return {v:"观察", c:"watch", r:"数据居中，再观察一轮或做小步优化（封面 / 标题 A/B）"};
}

/* ② 复盘洞察 tab: 关联探索散点 + 动作建议 */
function renderInsight(acc){
  const wrap = el(`<div></div>`);
  
  if(curPlatform==="dy"){
    wrap.appendChild(el(`<div class="insight-note" style="border:0;margin:0 0 10px">复盘洞察按<b>抖音</b>口径（5秒完播率）。数据来自作品概览中的6篇作品。</div>`));
    renderDyInsight(acc, wrap);
  } else {
    wrap.appendChild(el(`<div class="insight-note" style="border:0;margin:0 0 10px">复盘洞察按<b>小红书</b>口径（封面点击率×阅读量×平均观看时长）。数据来自作品概览中的6篇笔记。</div>`));
    renderXhsInsight(acc, wrap);
  }
  return wrap;
}

function renderDyInsight(acc, wrap){
  const w = acc.flowAnalysis && acc.flowAnalysis.dy ? acc.flowAnalysis.dy.itemList : null;

  wrap.appendChild(sectionLabel("① 抖音作品关联探索 · 5秒完播率 × 播放量"));
  let anyWorks = false;
  if(w && w.length){
    anyWorks = true;
    const block = el(`<div class="platform-block">${pfTitle("dy")}</div>`);
    const card = el(`<div class="card"></div>`);
    const id = "scatter_dy";
    card.appendChild(el(`<div class="scatter-wrap"><canvas id="${id}"></canvas></div>`));
    card.appendChild(el(`<div class="insight-note">每个气泡是一条作品：横轴=5秒完播率（留存），纵轴=播放量，气泡越大=平均播放时长越长。<b>右上角</b>=既留得住人又跑得动量的好选题；<b>右下角</b>=留存好但没跑量（曝光/封面待优化）。</div>`));
    block.appendChild(card);
    wrap.appendChild(block);
    requestAnimationFrame(()=>drawDyScatter(id, w, "dy"));
  } else {
    wrap.appendChild(emptyPlatform("dy","该平台暂无作品数据，无法做关联"));
  }

  wrap.appendChild(sectionLabel("② 抖音复盘动作建议 · 数据直接接动作（保留 / 优化 / 砍）"));
  if(w && w.length){
    const block = el(`<div class="platform-block">${pfTitle("dy")}</div>`);
    const card = el(`<div class="card"></div>`);
    const list = el(`<div class="act-list"></div>`);
    w.forEach(it=>{
      const plays = parseNum(it.plays), finish = parseNum(it.finishRate5s);
      const v = computeVerdict(plays, finish);
      list.appendChild(el(`<div class="act-item">
        <div class="act-badge ${v.c}">${v.v}</div>
        <div class="act-main">
          <div class="act-title">${it.title}</div>
          <div class="act-reason">${v.r}</div>
          <div class="act-stats">
            <span>播放 <b>${it.plays}</b></span>
            <span>5秒完播率 <b>${it.finishRate5s||"—"}</b></span>
            <span>平均时长 <b>${it.avgDur||"—"}</b></span>
          </div>
        </div>
      </div>`));
    });
    card.appendChild(list);
    block.appendChild(card);
    wrap.appendChild(block);
  }

  if(!anyWorks){
    wrap.appendChild(el(`<div class="empty big"><div class="ei">📭</div>暂无可用于关联/复盘的作品数据。</div>`));
  }
}

function renderXhsInsight(acc, wrap){
  const w = acc.flowAnalysis && acc.flowAnalysis.xhs ? acc.flowAnalysis.xhs.itemList : null;

  wrap.appendChild(sectionLabel("① 小红书笔记关联探索 · 封面点击率 × 阅读量"));
  let anyWorks = false;
  if(w && w.length){
    anyWorks = true;
    const block = el(`<div class="platform-block">${pfTitle("xhs")}</div>`);
    const card = el(`<div class="card"></div>`);
    const id = "scatter_xhs";
    card.appendChild(el(`<div class="scatter-wrap"><canvas id="${id}"></canvas></div>`));
    card.appendChild(el(`<div class="insight-note">每个气泡是一条笔记：横轴=封面点击率（吸引度），纵轴=阅读量，气泡越大=平均观看时长越长。<b>右上角</b>=封面吸引人且阅读量高；<b>右下角</b>=封面好但阅读没跑量（标题/推荐算法待优化）。</div>`));
    block.appendChild(card);
    wrap.appendChild(block);
    requestAnimationFrame(()=>drawXhsScatter(id, w));
  } else {
    wrap.appendChild(emptyPlatform("xhs","该平台暂无笔记数据，无法做关联"));
  }

  wrap.appendChild(sectionLabel("② 小红书复盘动作建议 · 封面点击率 × 阅读量 × 观看时长"));
  if(w && w.length){
    const block = el(`<div class="platform-block">${pfTitle("xhs")}</div>`);
    const card = el(`<div class="card"></div>`);
    const list = el(`<div class="act-list"></div>`);
    w.forEach(it=>{
      const plays = parseNum(it.plays);
      const ctr = parseNum(it.ctr);
      const avgDur = parseNum(it.avgDur);
      let verdict;
      if(plays >= 100000) verdict = {v:"保留", c:"keep", r:"爆款笔记，阅读破10万——复制这个选题方向，加大同类产出"};
      else if(ctr >= 15 && avgDur >= 80) verdict = {v:"优化", c:"tune", r:"封面点击率和观看时长都不错、但阅读没跑量——内容留得住人，瓶颈在曝光/标题，值得加推或复制选题"};
      else if(ctr < 10 || avgDur < 40) verdict = {v:"砍", c:"cut", r:"封面点击率偏低或观看时长太短——封面/标题没吸引力或内容留不住人，优化前3秒或换选题"};
      else verdict = {v:"观察", c:"watch", r:"数据居中，再观察一轮或做小步优化（封面 / 标题 A/B）"};
      list.appendChild(el(`<div class="act-item">
        <div class="act-badge ${verdict.c}">${verdict.v}</div>
        <div class="act-main">
          <div class="act-title">${it.title}</div>
          <div class="act-reason">${verdict.r}</div>
          <div class="act-stats">
            <span>阅读 <b>${it.plays}</b></span>
            <span>封面点击率 <b>${it.ctr||"—"}</b></span>
            <span>平均时长 <b>${it.avgDur||"—"}</b></span>
          </div>
        </div>
      </div>`));
    });
    card.appendChild(list);
    block.appendChild(card);
    wrap.appendChild(block);
  }

  if(!anyWorks){
    wrap.appendChild(el(`<div class="empty big"><div class="ei">📭</div>暂无可用于关联/复盘的作品数据。</div>`));
  }
}

function drawDyScatter(id, items, pf){
  const cvs = document.getElementById(id);
  if(!cvs) return;
  const color = "#4C8DFF";
  const pts = items.map(it=>({
    x: parseNum(it.finishRate5s), y: parseNum(it.plays),
    r: Math.max(7, Math.min(26, parseNum(it.avgDur)||18)),
    title: it.title
  }));
  charts.push(new Chart(cvs,{
    type:"bubble",
    data:{ datasets:[{ data:pts, backgroundColor:color+"55", borderColor:color, borderWidth:1.5 }]},
    options:{ responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{display:false},
        tooltip:{ callbacks:{ label:(ctx)=>{
          const p=ctx.raw;
          const playTxt = p.y>=10000 ? (p.y/10000)+"万" : p.y;
          return `${p.title} · 完播 ${p.x}% · 播放 ${playTxt}`;
        }}}},
      scales:{
        x:{ title:{display:true,text:"5秒完播率 %",font:{size:11},color:"#8f959e"},
            grid:{color:"#f2f3f5"}, ticks:{font:{size:10},color:"#8f959e"}, beginAtZero:true },
        y:{ title:{display:true,text:"播放量",font:{size:11},color:"#8f959e"},
            grid:{color:"#f2f3f5"}, beginAtZero:true,
            ticks:{font:{size:10},color:"#8f959e",callback:v=>v>=10000?(v/10000)+"万":v} } }
    }
  }));
}

function drawXhsScatter(id, items){
  const cvs = document.getElementById(id);
  if(!cvs) return;
  const color = "#FF4D6D";
  const pts = items.map(it=>({
    x: parseNum(it.ctr), y: parseNum(it.plays),
    r: Math.max(7, Math.min(26, parseNum(it.avgDur)||18)),
    title: it.title
  }));
  charts.push(new Chart(cvs,{
    type:"bubble",
    data:{ datasets:[{ data:pts, backgroundColor:color+"55", borderColor:color, borderWidth:1.5 }]},
    options:{ responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{display:false},
        tooltip:{ callbacks:{ label:(ctx)=>{
          const p=ctx.raw;
          const playTxt = p.y>=10000 ? (p.y/10000)+"万" : p.y;
          return `${p.title} · 点击率 ${p.x}% · 阅读 ${playTxt}`;
        }}}},
      scales:{
        x:{ title:{display:true,text:"封面点击率 %",font:{size:11},color:"#8f959e"},
            grid:{color:"#f2f3f5"}, ticks:{font:{size:10},color:"#8f959e"}, beginAtZero:true },
        y:{ title:{display:true,text:"阅读量",font:{size:11},color:"#8f959e"},
            grid:{color:"#f2f3f5"}, beginAtZero:true,
            ticks:{font:{size:10},color:"#8f959e",callback:v=>v>=10000?(v/10000)+"万":v} } }
    }
  }));
}

/* ===================== 启动 ===================== */
renderSidebar();
renderContent();
</script>
